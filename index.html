<!DOCTYPE html>
<html>
<head>
    <title>Product Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <h1>🛒 Product Marketplace</h1>
            <a href="admin.html" class="admin-btn">➕ Add Product</a>
        </nav>
    </header>
    
    <div class="container">
        <div id="productsGrid">
            <div style="text-align:center;padding:3rem;color:#666;">
                <i class="fas fa-box" style="font-size:4rem;"></i>
                <h2>No products yet</h2>
                <p>Click "Add Product" to start selling!</p>
                <a href="admin.html" class="admin-btn" style="display:inline-block;margin-top:1rem;">Start Selling</a>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
