<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <h1>⚙️ Add Product</h1>
            <a href="index.html" class="home-btn">🏠 View Store</a>
        </nav>
    </header>
    
    <div class="container">
        <form id="productForm">
            <h2>➕ New Product</h2>
            
            <input type="text" id="title" placeholder="📱 Product Title *" required>
            <textarea id="description" placeholder="✨ Description *" rows="3" required></textarea>
            <input type="text" id="category" placeholder="👕 Category (Electronics, Clothing...)">
            
            <input type="url" id="imageUrl" placeholder="🖼️ Main Image URL (Imgur direct link)">
            <small><a href="https://imgur.com/upload" target="_blank">Upload image → Copy direct link</a></small>
            
            <input type="url" id="buyerLink" placeholder="🔗 WhatsApp: https://wa.me/1234567890">
            
            <textarea id="photosUrl" placeholder="📸 Extra photos (one URL per line)" rows="2"></textarea>
            
            <button type="submit" style="background:#48bb78;font-size:1.1rem;">✅ Publish Product</button>
        </form>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
