<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <h1>⚙️ Admin Panel</h1>
            <a href="index.html" class="home-btn">🏠 View Products</a>
        </nav>
    </header>
    
    <div class="container">
        <form id="productForm">
            <h2>Add New Product</h2>
            
            <input type="text" id="title" placeholder="Product Title *" required>
            <textarea id="description" placeholder="Description *" rows="4" required></textarea>
            <input type="url" id="buyerLink" placeholder="WhatsApp: https://wa.me/1234567890">
            <input type="text" id="category" placeholder="Category (optional)">
            
            <input type="file" id="photos" multiple accept="image/*">
            <button type="submit">➕ Add Product</button>
        </form>
    </div>
    
    <script src="script.js"></script>
    <script>
        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const product = {
                id: Date.now(),
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                buyerLink: document.getElementById('buyerLink').value,
                category: document.getElementById('category').value,
                photos: []
            };
            
            // Save to localStorage
            let products = JSON.parse(localStorage.getItem('products') || '[]');
            products.unshift(product);
            localStorage.setItem('products', JSON.stringify(products));
            
            alert('✅ Product Added!');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
